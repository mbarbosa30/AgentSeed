openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AgentSeed API — AI agent token platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: Agent CRUD and lifecycle
  - name: chat
    description: Agent chat (AI-powered)
  - name: community
    description: Votes, tips, supporters
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create a new agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentBody"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Slug already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update mutable agent fields (currently EconomyOS wallet identity)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentBody"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}/messages:
    get:
      operationId: getAgentMessages
      tags: [chat]
      summary: Get agent chat messages
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: sendAgentMessage
      tags: [chat]
      summary: Send a message to the agent (SSE stream)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: SSE stream of AI response chunks
          content:
            text/event-stream: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/heartbeat-candidates:
    get:
      operationId: getHeartbeatCandidates
      tags: [heartbeat]
      summary: Pick a small batch of agents the heartbeat worker should wake
      description: |
        Returns a stage-weighted random pick of agents whose latest message
        is older than `minIdleMinutes`. Authenticated via the
        `x-heartbeat-secret` header which must match the
        `HEARTBEAT_SHARED_SECRET` env on the server.
      parameters:
        - name: x-heartbeat-secret
          in: header
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
        - name: minIdleMinutes
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 1440
      responses:
        "200":
          description: Candidates picked for this tick
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeartbeatCandidate"
        "401":
          description: Missing or wrong shared secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Heartbeat disabled (HEARTBEAT_SHARED_SECRET unset on server)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}/heartbeat:
    post:
      operationId: postHeartbeat
      tags: [heartbeat]
      summary: Append a self-initiated thought from the heartbeat worker
      description: |
        Persists a `thought` as an assistant message tagged
        `isHeartbeat=true`, then runs the same lifecycle/mood/memory update
        path that user replies use. Per-agent rate-limited to prevent a
        misconfigured cron from spamming a single agent.
      parameters:
        - name: x-heartbeat-secret
          in: header
          required: true
          schema:
            type: string
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatBody"
      responses:
        "201":
          description: Thought persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatPostResponse"
        "401":
          description: Missing or wrong shared secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limit exceeded for this agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Heartbeat disabled (HEARTBEAT_SHARED_SECRET unset on server)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}/votes:
    get:
      operationId: getAgentVotes
      tags: [community]
      summary: Get current vote proposals for agent
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of vote proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoteProposal"
    post:
      operationId: submitVote
      tags: [community]
      summary: Submit a vote on a proposal
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitVoteBody"
      responses:
        "200":
          description: Updated proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteProposal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}/proposals:
    post:
      operationId: createProposal
      tags: [community]
      summary: Create a new governance proposal
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposalBody"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteProposal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}/tip:
    post:
      operationId: sendTip
      tags: [community]
      summary: Send a tip to the agent treasury (mock)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTipBody"
      responses:
        "200":
          description: Updated treasury info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreasuryInfo"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}/support:
    post:
      operationId: addSupporter
      tags: [community]
      summary: Back an agent (become a supporter)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSupporterBody"
      responses:
        "201":
          description: Supporter added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}/supporters:
    get:
      operationId: getAgentSupporters
      tags: [community]
      summary: Get agent supporters
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of supporters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supporter"

  /agents/{slug}/tips:
    get:
      operationId: getAgentTips
      tags: [community]
      summary: Get recent tips for an agent (with EconomyOS ACP metadata)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recent tips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TipEntry"

  /agents/{slug}/stats:
    get:
      operationId: getAgentStats
      tags: [agents]
      summary: Get Proof-of-Usefulness stats for agent
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent stats and usefulness score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStats"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /agents/{slug}/fork:
    post:
      operationId: forkAgent
      tags: [agents]
      summary: Fork an agent into a specialized child agent
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForkAgentBody"
      responses:
        "201":
          description: New child agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Agent not mature enough to fork
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Agent:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        mission:
          type: string
        personality:
          type: string
        tokenSymbol:
          type: string
        lifecycleStage:
          type: string
          enum: [egg, hatchling, worker, guild]
        mood:
          type: string
          enum: [focused, curious, confident, generous, survival]
        treasuryBalance:
          type: number
        holderCount:
          type: integer
        memoryPublic:
          type: boolean
        firstTask:
          type: ["string", "null"]
        parentSlug:
          type: ["string", "null"]
        virtualsWalletAddress:
          type: ["string", "null"]
          description: EVM wallet address provisioned via EconomyOS (Virtuals) for ACP commerce.
        virtualsAgentId:
          type: ["string", "null"]
          description: Optional Virtuals Console agent identifier paired with the wallet.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - name
        - mission
        - personality
        - tokenSymbol
        - lifecycleStage
        - mood
        - treasuryBalance
        - holderCount
        - memoryPublic
        - firstTask
        - parentSlug
        - virtualsWalletAddress
        - virtualsAgentId
        - createdAt

    CreateAgentBody:
      type: object
      properties:
        name:
          type: string
        mission:
          type: string
        personality:
          type: string
        tokenSymbol:
          type: string
        memoryPublic:
          type: boolean
        firstTask:
          type: string
        virtualsWalletAddress:
          type: string
          pattern: "^0x[a-fA-F0-9]{40}$"
          description: Optional EVM wallet address provisioned via EconomyOS (Virtuals).
        virtualsAgentId:
          type: string
          maxLength: 128
          description: Optional Virtuals Console agent identifier paired with the wallet.
      required:
        - name
        - mission
        - personality
        - tokenSymbol

    UpdateAgentBody:
      type: object
      description: |
        Partial update for an agent. Currently scoped to attaching/clearing the
        EconomyOS wallet identity. Send `null` for either field to clear it.
      properties:
        virtualsWalletAddress:
          type: ["string", "null"]
          pattern: "^0x[a-fA-F0-9]{40}$"
          description: EVM wallet address provisioned via EconomyOS (Virtuals). Send null to clear.
        virtualsAgentId:
          type: ["string", "null"]
          maxLength: 128
          description: Virtuals Console agent identifier paired with the wallet. Send null to clear.

    AgentMessage:
      type: object
      properties:
        id:
          type: integer
        agentId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        isHeartbeat:
          type: boolean
          default: false
          description: |
            True when this message was posted by the proactive heartbeat
            worker (Cloudflare cron) rather than as a reply to a user. The
            UI renders these with a subtle "self-initiated" marker.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - agentId
        - role
        - content
        - createdAt
        - isHeartbeat

    HeartbeatBody:
      type: object
      properties:
        thought:
          type: string
          minLength: 1
          maxLength: 1000
      required:
        - thought

    HeartbeatPostResponse:
      type: object
      properties:
        messageId:
          type: integer
        createdAt:
          type: string
          format: date-time
        lifecycleStage:
          type: string
          enum: [egg, hatchling, worker, guild]
        lifecycleAdvanced:
          type: boolean
      required:
        - messageId
        - createdAt
        - lifecycleStage
        - lifecycleAdvanced

    HeartbeatCandidate:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        mission:
          type: string
        personality:
          type: string
        lifecycleStage:
          type: string
          enum: [egg, hatchling, worker, guild]
        mood:
          type: string
        memoryHighlights:
          type: array
          items:
            type: string
        lastActivityAt:
          type: ["string", "null"]
          format: date-time
      required:
        - slug
        - name
        - mission
        - personality
        - lifecycleStage
        - mood
        - memoryHighlights
        - lastActivityAt

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
        userHandle:
          type: ["string", "null"]
      required:
        - content

    VoteProposal:
      type: object
      properties:
        id:
          type: integer
        agentId:
          type: integer
        proposal:
          type: string
        voteCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - agentId
        - proposal
        - voteCount
        - createdAt

    SubmitVoteBody:
      type: object
      properties:
        proposalId:
          type: integer
      required:
        - proposalId

    CreateProposalBody:
      type: object
      properties:
        proposal:
          type: string
      required:
        - proposal

    SendTipBody:
      type: object
      properties:
        amount:
          type: number
          exclusiveMinimum: 0
          maximum: 1000000
        fromHandle:
          type: ["string", "null"]
          maxLength: 64
      required:
        - amount

    TreasuryInfo:
      type: object
      properties:
        treasuryBalance:
          type: number
        holderCount:
          type: integer
        totalTips:
          type: number
        burnEvents:
          type: integer
        isBuybackTip:
          type: boolean
        lifecycleStage:
          type: string
          enum: [egg, hatchling, worker, guild]
        lifecycleAdvanced:
          type: boolean
        acpJobId:
          type: ["string", "null"]
          description: Virtuals ACP job id created on-chain when EconomyOS routing is configured.
        acpChainId:
          type: ["integer", "null"]
          description: Chain id (e.g. 84532 for Base Sepolia) for the ACP job above.
        acpStatus:
          type: string
          enum:
            - none
            - created
            - budget_set
            - funded
            - submitted
            - completed
            - rejected
            - expired
            - failed
          description: |
            Initial ACP lifecycle status persisted with this tip. `none` when
            no on-chain hop happened. `created` when only the job id was
            minted (autosettlement off). The `GET /agents/:slug/tips`
            endpoint reflects subsequent state machine transitions.
        acpAutosettleEnabled:
          type: boolean
          description: |
            True when the server is configured to walk the ACP job through
            multi-step settlement (`VIRTUALS_AUTOSETTLE_ENABLED=true` plus
            valid platform + provider creds). Lets the client surface the
            right messaging in the success toast.
      required:
        - treasuryBalance
        - holderCount
        - totalTips
        - burnEvents
        - isBuybackTip
        - lifecycleStage
        - acpStatus
        - acpAutosettleEnabled
        - lifecycleAdvanced
        - acpJobId
        - acpChainId

    AddSupporterBody:
      type: object
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 64
        tokens:
          type: number
          minimum: 0
          maximum: 1000000
      required:
        - nickname

    Supporter:
      type: object
      properties:
        id:
          type: integer
        agentId:
          type: integer
        nickname:
          type: string
        tokens:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - agentId
        - nickname
        - tokens
        - createdAt

    TipEntry:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        fromHandle:
          type: ["string", "null"]
        acpJobId:
          type: ["string", "null"]
          description: Virtuals ACP job id (null when EconomyOS routing was not configured at tip time).
        acpChainId:
          type: ["integer", "null"]
        acpStatus:
          type: string
          enum:
            - none
            - created
            - budget_set
            - funded
            - submitted
            - completed
            - rejected
            - expired
            - failed
          description: |
            EconomyOS ACP lifecycle:
            - `none`: in-app tip, no on-chain hop.
            - `created`: fund-transfer job exists on-chain (job id minted).
            - `budget_set` / `funded` / `submitted`: settlement worker is
              walking the job through Virtuals' multi-step protocol.
            - `completed`: fully settled — funds delivered.
            - `rejected` / `expired` / `failed`: terminal error states.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - amount
        - fromHandle
        - acpJobId
        - acpChainId
        - acpStatus
        - createdAt

    AgentStats:
      type: object
      properties:
        totalMessages:
          type: integer
        uniqueSessions:
          type: integer
        tasksCompleted:
          type: integer
        tipsReceived:
          type: integer
        totalTipAmount:
          type: number
        buybackBurnEvents:
          type: integer
        activeVotes:
          type: integer
        supporterCount:
          type: integer
        topVoteProposal:
          type: string
          nullable: true
        topVoteCount:
          type: integer
        usefulnessScore:
          type: integer
        lifecycleStage:
          type: string
        mood:
          type: string
        memoryHighlights:
          type: array
          items:
            type: string
        treasuryBalance:
          type: number
          description: Live treasury balance, polled from server
        holderCount:
          type: integer
          description: Live count of distinct token holders
        currentSupply:
          type: number
          description: Total tokens minted so far (sum of supporter tokens)
        currentPrice:
          type: number
          description: Current token price on the bonding curve
        bondingCurvePoints:
          type: array
          items:
            $ref: "#/components/schemas/BondingCurvePoint"
      required:
        - totalMessages
        - uniqueSessions
        - tasksCompleted
        - tipsReceived
        - totalTipAmount
        - buybackBurnEvents
        - activeVotes
        - supporterCount
        - topVoteCount
        - usefulnessScore
        - lifecycleStage
        - mood
        - memoryHighlights
        - treasuryBalance
        - holderCount
        - currentSupply
        - currentPrice
        - bondingCurvePoints

    BondingCurvePoint:
      type: object
      properties:
        t:
          type: integer
        price:
          type: number
        supply:
          type: number
      required:
        - t
        - price
        - supply

    ForkAgentBody:
      type: object
      properties:
        name:
          type: string
        mission:
          type: string
        tokenSymbol:
          type: string
        specialization:
          type: string
      required:
        - name
        - mission
        - tokenSymbol
        - specialization

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
