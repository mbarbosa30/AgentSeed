kind = "web"
previewPath = "/"
title = "AgentSeed"
version = "1.0.0"
id = "artifacts/agentseed"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24365

[services.development]
run = "pnpm --filter @workspace/agentseed run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agentseed", "run", "build" ]
publicDir = "artifacts/agentseed/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24365"
BASE_PATH = "/"
